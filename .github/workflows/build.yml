name: Build Installer

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      sign_with_test_certificate:
        description: 'Submit the generated installer to SignPath test-signing'
        required: true
        type: boolean
        default: false
      sign_with_production_certificate:
        description: 'Test production signing from main without publishing a GitHub Release'
        required: true
        type: boolean
        default: false

jobs:
  build:
    name: Build HypoMux (Python ${{ matrix.python-version }})
    runs-on: windows-2025
    permissions:
      actions: read
      contents: read
    strategy:
      matrix:
        python-version: ['3.13'] 

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate manual signing mode
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $useTestCertificate = "${{ inputs.sign_with_test_certificate }}" -eq "true"
          $useProductionCertificate = "${{ inputs.sign_with_production_certificate }}" -eq "true"

          if ($useTestCertificate -and $useProductionCertificate) {
            throw "Choose either test signing or production-signing test, not both."
          }
          if ($useProductionCertificate -and "${{ github.ref }}" -ne "refs/heads/main") {
            throw "Production-signing tests must be started from the main branch."
          }
          if ($useTestCertificate -and "${{ github.ref }}" -like "refs/tags/*") {
            throw "Test signing must not be started from a release tag."
          }

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka zstandard

      - name: Get version string
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
            $display = $tag -replace '^v', ''
            $numeric = ($display -split '-')[0]
            if ($numeric -notmatch '^\d+(\.\d+){1,3}$') { $numeric = '0.0.0' }
            "VERSION=$tag" >> $env:GITHUB_OUTPUT
            "DISPLAY_VERSION=$display" >> $env:GITHUB_OUTPUT
            "INNO_VERSION=$numeric" >> $env:GITHUB_OUTPUT
          } else {
            $shortSha = git rev-parse --short HEAD
            "VERSION=dev-$shortSha" >> $env:GITHUB_OUTPUT
            "DISPLAY_VERSION=dev-$shortSha" >> $env:GITHUB_OUTPUT
            "INNO_VERSION=0.0.0" >> $env:GITHUB_OUTPUT
          }

      # 优化点：添加 shell: pwsh，并直接使用 --output-filename 让 Nuitka 输出 HypoMux.exe
      # 同时嵌入 Windows 版本资源，使 EXE 属性/任务管理器显示规范的产品名与版本号
      - name: Build with Nuitka
        shell: pwsh
        run: |
          # 让运行中的应用版本与 Git tag 一致，供 GitHub Release 更新检查比较。
          Set-Content -Path "hypomux-version.txt" -Value "${{ steps.version.outputs.DISPLAY_VERSION }}" -NoNewline -Encoding ascii
          # 仅打包运行时资源（包含 support\SignPath\SignPath.png），避免把 README 截图等 assets 素材带入安装包。
          python -m nuitka `
            --standalone `
            --enable-plugin=pyside6 `
            --windows-console-mode=disable `
            --windows-icon-from-ico=assets\icon.ico `
            --windows-uac-admin `
            --company-name=Hypostasis-Cat `
            --product-name=HypoMux `
            --file-description=HypoMux `
            --file-version=${{ steps.version.outputs.INNO_VERSION }} `
            --product-version=${{ steps.version.outputs.INNO_VERSION }} `
            --include-data-file=hypomux-version.txt=hypomux-version.txt `
            --copyright="Copyright (C) 2026 Hypostasis-Cat" `
            --include-package-data=qfluentwidgets `
            --include-data-dir=support=support `
            --clean-cache=all `
            --remove-output `
            --output-dir=dist `
            --output-filename=HypoMux `
            --assume-yes-for-downloads `
            main.py

          if (-not (Test-Path "dist\main.dist")) {
            $distDir = Get-ChildItem -Path dist -Directory -Filter "*.dist" | Select-Object -First 1
            if ($null -eq $distDir) {
              Get-ChildItem -Path dist -Recurse -ErrorAction SilentlyContinue
              throw "Nuitka did not produce a standalone .dist directory."
            }
            Move-Item -Path $distDir.FullName -Destination "dist\main.dist"
          }

          if (-not (Test-Path "dist\main.dist\HypoMux.exe")) {
            Get-ChildItem -Path "dist\main.dist" -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue
            throw "Expected dist\main.dist\HypoMux.exe was not found."
          }

      # diagnostic.exe 由仓库内的 Rust 源码构建；不能复用仓库中已有的旧二进制。
      - name: Build diagnostic core
        shell: pwsh
        run: |
          cargo build --manifest-path hypomux-diagnostic\Cargo.toml --release
          Copy-Item -Path "hypomux-diagnostic\target\release\diagnostic.exe" -Destination "diagnostic.exe" -Force

      # 正式 Release 由 tag push 触发；也可从 main 手动测试生产签名。
      # 两种情况均使用 SignPath 生产策略，并须在 UI 人工批准每个请求。
      - name: Upload HypoMux executable for SignPath production signing
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.sign_with_production_certificate && github.ref == 'refs/heads/main')
        id: upload-hypomux-production-executable
        uses: actions/upload-artifact@v7
        with:
          path: dist/main.dist/HypoMux.exe
          archive: false
          if-no-files-found: error

      - name: Sign HypoMux executable with SignPath production certificate
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.sign_with_production_certificate && github.ref == 'refs/heads/main')
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: 4463263d-e740-4262-ae16-7eac788453ea
          project-slug: HypoMux
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload-hypomux-production-executable.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 3600
          output-artifact-directory: signed-hypomux-production
          skip-decompress: true

      # diagnostic.exe is built from hypomux-diagnostic/src in this repository;
      # it is a HypoMux-owned artifact, unlike bundled upstream binaries.
      - name: Upload diagnostic executable for SignPath production signing
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.sign_with_production_certificate && github.ref == 'refs/heads/main')
        id: upload-diagnostic-production-executable
        uses: actions/upload-artifact@v7
        with:
          path: diagnostic.exe
          archive: false
          if-no-files-found: error

      - name: Sign diagnostic executable with SignPath production certificate
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.sign_with_production_certificate && github.ref == 'refs/heads/main')
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: 4463263d-e740-4262-ae16-7eac788453ea
          project-slug: HypoMux
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload-diagnostic-production-executable.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 3600
          output-artifact-directory: signed-diagnostic-production
          skip-decompress: true

      - name: Use production-signed HypoMux executables
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.sign_with_production_certificate && github.ref == 'refs/heads/main')
        shell: pwsh
        run: |
          Copy-Item -Path "signed-hypomux-production\HypoMux.exe" -Destination "dist\main.dist\HypoMux.exe" -Force
          Copy-Item -Path "signed-diagnostic-production\diagnostic.exe" -Destination "diagnostic.exe" -Force

      # SignPath 的默认 PE 构件配置一次只签一个 PE 文件。先签我们自己构建的程序，
      # 再将签名后的文件封装进 Inno Setup 安装包，避免安装后主程序仍是未签名状态。
      - name: Upload HypoMux executable for SignPath test signing
        if: github.event_name == 'workflow_dispatch' && inputs.sign_with_test_certificate && !inputs.sign_with_production_certificate && !startsWith(github.ref, 'refs/tags/v')
        id: upload-hypomux-executable
        uses: actions/upload-artifact@v7
        with:
          path: dist/main.dist/HypoMux.exe
          archive: false
          if-no-files-found: error

      - name: Sign HypoMux executable with SignPath test certificate
        if: github.event_name == 'workflow_dispatch' && inputs.sign_with_test_certificate && !inputs.sign_with_production_certificate && !startsWith(github.ref, 'refs/tags/v')
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: 4463263d-e740-4262-ae16-7eac788453ea
          project-slug: HypoMux
          signing-policy-slug: test-signing
          github-artifact-id: ${{ steps.upload-hypomux-executable.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-hypomux
          skip-decompress: true

      - name: Upload diagnostic executable for SignPath test signing
        if: github.event_name == 'workflow_dispatch' && inputs.sign_with_test_certificate && !inputs.sign_with_production_certificate && !startsWith(github.ref, 'refs/tags/v')
        id: upload-diagnostic-executable
        uses: actions/upload-artifact@v7
        with:
          path: diagnostic.exe
          archive: false
          if-no-files-found: error

      - name: Sign diagnostic executable with SignPath test certificate
        if: github.event_name == 'workflow_dispatch' && inputs.sign_with_test_certificate && !inputs.sign_with_production_certificate && !startsWith(github.ref, 'refs/tags/v')
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: 4463263d-e740-4262-ae16-7eac788453ea
          project-slug: HypoMux
          signing-policy-slug: test-signing
          github-artifact-id: ${{ steps.upload-diagnostic-executable.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-diagnostic
          skip-decompress: true

      - name: Use test-signed HypoMux executables
        if: github.event_name == 'workflow_dispatch' && inputs.sign_with_test_certificate && !inputs.sign_with_production_certificate && !startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Copy-Item -Path "signed-hypomux\HypoMux.exe" -Destination "dist\main.dist\HypoMux.exe" -Force
          Copy-Item -Path "signed-diagnostic\diagnostic.exe" -Destination "diagnostic.exe" -Force

      # 呼叫 Windows 虚拟机自带的 Inno Setup 编译器打包安装包
      # 通过 /D 注入版本号：DISPLAY_VERSION 作显示/文件名，INNO_VERSION 作纯数字文件版本
      - name: Compile Installer with Inno Setup
        shell: pwsh
        run: |
          iscc /DMyAppVersion="${{ steps.version.outputs.DISPLAY_VERSION }}" /DMyAppVersionInfo="${{ steps.version.outputs.INNO_VERSION }}" setup.iss

      - name: Upload installer for SignPath production signing
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.sign_with_production_certificate && github.ref == 'refs/heads/main')
        id: upload-production-installer
        uses: actions/upload-artifact@v7
        with:
          path: Output/HypoMux_Setup_${{ steps.version.outputs.DISPLAY_VERSION }}.exe
          archive: false
          if-no-files-found: error

      - name: Sign installer with SignPath production certificate
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.sign_with_production_certificate && github.ref == 'refs/heads/main')
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: 4463263d-e740-4262-ae16-7eac788453ea
          project-slug: HypoMux
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload-production-installer.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 3600
          output-artifact-directory: signed-installer-production
          skip-decompress: true

      - name: Use production-signed installer
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.sign_with_production_certificate && github.ref == 'refs/heads/main')
        shell: pwsh
        run: |
          Copy-Item -Path "signed-installer-production\HypoMux_Setup_${{ steps.version.outputs.DISPLAY_VERSION }}.exe" -Destination "Output\HypoMux_Setup_${{ steps.version.outputs.DISPLAY_VERSION }}.exe" -Force

      # 收集打包出来的安装包 (.exe)，作为 Actions 临时工件上传
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: HypoMux-Installer-${{ steps.version.outputs.VERSION }}
          path: Output/*.exe 
          if-no-files-found: error

      # 最后签外层安装包。测试签名只能从手动触发的工作流提交，防止测试证书产物进入正式 Release。
      # archive: false 让 SignPath 的 PE 构件配置直接接收安装包，而不是 GitHub 包装的 ZIP。
      - name: Upload installer for SignPath test signing
        if: github.event_name == 'workflow_dispatch' && inputs.sign_with_test_certificate && !inputs.sign_with_production_certificate && !startsWith(github.ref, 'refs/tags/v')
        id: upload-unsigned-installer
        uses: actions/upload-artifact@v7
        with:
          path: Output/HypoMux_Setup_${{ steps.version.outputs.DISPLAY_VERSION }}.exe
          archive: false
          if-no-files-found: error

      - name: Sign installer with SignPath test certificate
        if: github.event_name == 'workflow_dispatch' && inputs.sign_with_test_certificate && !inputs.sign_with_production_certificate && !startsWith(github.ref, 'refs/tags/v')
        id: signpath-test
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: 4463263d-e740-4262-ae16-7eac788453ea
          project-slug: HypoMux
          signing-policy-slug: test-signing
          github-artifact-id: ${{ steps.upload-unsigned-installer.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-installer
          skip-decompress: true

      - name: Upload SignPath test-signed installer
        if: github.event_name == 'workflow_dispatch' && inputs.sign_with_test_certificate && !inputs.sign_with_production_certificate && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: HypoMux-Test-Signed-${{ steps.version.outputs.VERSION }}
          path: signed-installer/*.exe
          if-no-files-found: error

  release:
    name: Upload Installer to Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download installer
        uses: actions/download-artifact@v5
        with:
          name: HypoMux-Installer-${{ github.ref_name }}
          path: ./output_dir

      # 若用户已在网页手动发布同标签 Release，action 只补充安装包，
      # 不传 name/body/generate_release_notes，以保留用户填写的标题和更新日志。
      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./output_dir/*.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
